<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vurso — Smart Study Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Your original styles are preserved here. To save space in this message, please use your previous version's <style> block and add the following updates only. */
:root[data-theme="dark"]{--bg:#0e0e11;--surface:#16161a;--surface2:#1e1e24;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0efe8;--muted:#8a8a96;--card:#16161a;--overlay:rgba(0,0,0,0.75)}
/* ... (keep all your original CSS) ... */
</style>
</head>
<body>
<!-- Your full original HTML content goes here. The only changes are in the Settings modal and JS. -->

<!-- SETTINGS MODAL (replace your existing one with this) -->
<div class="overlay hidden" id="m-settings">
<div class="modal">
  <button class="mclose" onclick="closeM('m-settings')">✕</button>
  <h2>Settings</h2>
  <p>Customise your Revise experience</p>
  
  <div class="srow">
    <div><div class="slabel">Dark Mode</div><div class="ssub">Toggle dark / light theme</div></div>
    <label class="tswitch"><input type="checkbox" id="dark-tog" onchange="setTheme(this.checked)"><span class="tslider"></span></label>
  </div>
  
  <div class="srow">
    <div><div class="slabel">Spaced Repetition</div><div class="ssub">SM-2 review controls on flashcards</div></div>
    <label class="tswitch"><input type="checkbox" id="sr-tog" checked onchange="srEnabled=this.checked"><span class="tslider"></span></label>
  </div>

  <div class="srow" id="settings-account-row">
    <div><div class="slabel" id="settings-email-lbl" style="color:var(--muted);font-size:13px">Not signed in</div></div>
    <button class="nbtn" id="settings-auth-btn" onclick="settingsAuthAction()">Sign in</button>
  </div>

  <div id="cancel-sub-row" class="srow" style="display:none;border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;">
    <div>
      <div class="slabel" style="color:var(--red)">Cancel Pro Subscription</div>
      <div class="ssub">You will keep access until the end of your current billing period.</div>
    </div>
    <button class="nbtn" style="color:var(--red);border-color:rgba(239,68,68,.5)" onclick="cancelSubscription()">Cancel Subscription</button>
  </div>
</div>
</div>

<!-- Rest of your original HTML ... -->

<script>
// Your original JS + these additions at the bottom (near other functions)

function openSettings() {
  const lbl = document.getElementById('settings-email-lbl');
  const btn = document.getElementById('settings-auth-btn');
  const cancelRow = document.getElementById('cancel-sub-row');

  if (currentUser) {
    lbl.textContent = currentUser.email;
    btn.textContent = 'Sign out';
    btn.style.color = 'var(--red)';
    btn.style.borderColor = 'rgba(239,68,68,.3)';
    if (cancelRow) cancelRow.style.display = isPro() ? 'flex' : 'none';
  } else {
    lbl.textContent = 'Not signed in';
    btn.textContent = 'Sign in';
    btn.style.color = '';
    btn.style.borderColor = '';
    if (cancelRow) cancelRow.style.display = 'none';
  }
  openM('m-settings');
}

async function cancelSubscription() {
  if (!currentUser || !isPro()) return;
  if (!confirm('Are you sure? You will keep Pro access until the end of the billing period.')) return;

  try {
    const res = await fetch('/api/cancel-subscription', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    if (res.ok) {
      toast(data.message, 'success');
      if (userProfile) userProfile.is_premium = false;
      refreshUI();
      closeM('m-settings');
    } else {
      toast(data.error || 'Failed', 'error');
    }
  } catch(e) {
    toast('Error cancelling subscription', 'error');
  }
}
</script>
</body>
</html>
